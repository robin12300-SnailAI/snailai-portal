<!DOCTYPE html>
<html lang="zh-CN" data-title-zh="修改密码 · 蜗牛AI 学员学堂" data-title-en="Change Password · SnailAI Portal">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>修改密码 · 蜗牛AI 学员学堂</title>
  <script>
    // 双保险：若旧 GitHub Pages 站仍被访问，自动跳转
    if (location.hostname.indexOf('github.io') !== -1) {
      location.replace('/change-password.html');
    }
  </script>
  <style>
    :root{--paper:#FCFCFA;--ink:#1A1A2E;--ink2:#4a4a5e;--ink3:#8a8a9a;
      --line:#e6e6ec;--accent:#FF5B1F;--accent-soft:#fff1ea;
      --green:#10b981;--radius:14px;
      --shadow:0 2px 8px rgba(26,26,46,.06);--shadow-lg:0 8px 32px rgba(26,26,46,.10)}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",system-ui,sans-serif;
      background:var(--paper);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased;
      min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .card{background:#fff;border:1px solid var(--line);border-radius:var(--radius);
      box-shadow:var(--shadow-lg);padding:40px 34px;width:100%;max-width:400px;text-align:center}
    .logo{font-size:42px;margin-bottom:6px}
    h1{font-size:22px;font-weight:800;margin-bottom:4px}
    .sub{font-size:14px;color:var(--ink3);margin-bottom:24px}
    .field{text-align:left;margin-bottom:16px}
    .field label{display:block;font-size:13px;color:var(--ink2);margin-bottom:6px;font-weight:600}
    .field input{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:10px;
      font-size:15px;font-family:inherit;transition:.15s;background:var(--paper)}
    .field input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
    .btn{display:block;width:100%;padding:13px;border:none;border-radius:10px;font-size:16px;
      font-weight:700;cursor:pointer;transition:.15s;font-family:inherit}
    .btn-primary{background:var(--accent);color:#fff;margin-top:6px}
    .btn-primary:hover{filter:brightness(1.05);transform:translateY(-1px)}
    .btn-primary:disabled{opacity:.6;cursor:not-allowed;transform:none}
    .ghost{display:inline-block;margin-top:14px;font-size:13px;color:var(--ink3);text-decoration:none}
    .ghost:hover{color:var(--accent)}
    .err{color:#ef4444;font-size:13px;margin-top:10px;min-height:18px;text-align:left}
    .spinner{display:inline-block;width:16px;height:16px;border:2.5px solid #fff;
      border-top-color:transparent;border-radius:50%;animation:.6s linear infinite spin;vertical-align:-3px;margin-right:6px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .lang-switch{position:fixed;top:16px;right:16px;z-index:500;display:flex;gap:4px;
      background:#fff;border:1px solid var(--line);border-radius:100px;padding:4px;box-shadow:var(--shadow)}
    .lang-switch .lang-btn{font-family:inherit;font-size:13px;font-weight:600;border:none;
      background:transparent;color:var(--ink3);padding:6px 14px;border-radius:100px;cursor:pointer;transition:.15s}
    .lang-switch .lang-btn.active{background:var(--accent);color:#fff}
  </style>
</head>
<body>
  <div class="lang-switch">
    <button class="lang-btn active" data-lang="zh">中文</button>
    <button class="lang-btn" data-lang="en">EN</button>
  </div>

  <div class="card">
    <div class="logo">🔐</div>
    <h1 data-zh="修改密码" data-en="Change Password">修改密码</h1>
    <p class="sub" data-zh="首次登录请设置新密码（初始密码 12345）" data-en="Set a new password on first login (default 12345)">首次登录请设置新密码（初始密码 12345）</p>

    <form id="f" onsubmit="return doChange(event)">
      <div class="field">
        <label for="old" data-zh="原密码" data-en="Current Password">原密码</label>
        <input id="old" type="password" data-ph-zh="请输入原密码" data-ph-en="Enter current password" placeholder="请输入原密码" autocomplete="current-password" required>
      </div>
      <div class="field">
        <label for="np" data-zh="新密码" data-en="New Password">新密码</label>
        <input id="np" type="password" data-ph-zh="至少 4 位" data-ph-en="At least 4 chars" placeholder="至少 4 位" autocomplete="new-password" required>
      </div>
      <div class="field">
        <label for="np2" data-zh="确认新密码" data-en="Confirm New Password">确认新密码</label>
        <input id="np2" type="password" data-ph-zh="再次输入新密码" data-ph-en="Re-enter new password" placeholder="再次输入新密码" autocomplete="new-password" required>
      </div>
      <button type="submit" class="btn btn-primary" id="btn" data-zh="保存新密码" data-en="Save Password">保存新密码</button>
      <div class="err" id="err"></div>
    </form>
    <a class="ghost" href="welcome.html" data-zh="返回我的学堂" data-en="Back to My Portal">返回我的学堂</a>
  </div>

  <script>
    const LANG_KEY = "snailai-lang";
    const S_KEY = "snailai_api_token";
    const U_KEY = "snailai_me";
    // 未登录 → 回登录页
    if (!sessionStorage.getItem(S_KEY)) { location.href = "login.html"; }

    function setLang(lang){
      document.documentElement.setAttribute('lang', lang === 'en' ? 'en' : 'zh-CN');
      document.querySelectorAll('[data-zh]').forEach(el => {
        const t = el.getAttribute('data-' + lang);
        if (t !== null) el.textContent = t;
      });
      document.querySelectorAll('[data-ph-zh]').forEach(el => {
        el.setAttribute('placeholder', el.getAttribute('data-ph-' + lang));
      });
      const t = document.querySelector('[data-title-zh]');
      if (t) document.title = t.getAttribute('data-title-' + lang);
      document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
      localStorage.setItem(LANG_KEY, lang);
    }
    document.querySelectorAll('.lang-btn').forEach(b => b.addEventListener('click', () => setLang(b.dataset.lang)));
    setLang(localStorage.getItem(LANG_KEY) || 'zh');

    async function doChange(e) {
      e.preventDefault();
      const oldP = document.getElementById("old").value;
      const np = document.getElementById("np").value;
      const np2 = document.getElementById("np2").value;
      const btn = document.getElementById("btn");
      const err = document.getElementById("err");
      err.textContent = "";
      const L = localStorage.getItem(LANG_KEY) || 'zh';
      if (np.length < 4) { err.textContent = (L==='en'?'At least 4 characters':'新密码至少 4 位'); return false; }
      if (np !== np2) { err.textContent = (L==='en'?'Passwords do not match':'两次输入不一致'); return false; }
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>' + (L === 'en' ? 'Saving…' : '保存中...');
      try {
        const r = await fetch("/api/change-password", {
          method: "POST",
          headers: {"Content-Type": "application/json", "Authorization": "Bearer " + sessionStorage.getItem(S_KEY)},
          body: JSON.stringify({old_password: oldP, new_password: np})
        });
        const d = await r.json();
        if (!d.ok) throw new Error(d.error || (L === 'en' ? "Failed" : "修改失败"));
        alert(L === 'en' ? "Password updated. Please use your new password next time." : "密码已更新，下次请使用新密码登录。");
        location.href = "welcome.html";
      } catch(ex) {
        err.textContent = ex.message;
        btn.disabled = false;
        btn.innerHTML = btn.getAttribute('data-' + L);
      }
      return false;
    }
  </script>
<script src="/assets/analytics.js"></script>
</body>
</html>
