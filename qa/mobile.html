<head>

<meta name="description" content="蜗牛问答 — 蜗牛 AI 学员专属问答看板（手机版）。学生提问，老师回答，同学互助评论。" />
<style>
  :root {
    --ink: #1A1A2E;
    --ink-2: #2A2A40;
    --ink-3: #6A6A85;
    --paper: #FCFCFA;
    --paper-2: #F5F4EE;
    --accent: #FF5B1F;
    --accent-light: rgba(255,91,31,0.08);
    --line: rgba(26,26,46,0.08);
    --shadow-sm: 0 1px 3px rgba(26,26,46,0.04), 0 2px 8px rgba(26,26,46,0.04);
    --r-lg: 16px;
    --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); background: var(--paper); color: var(--ink); line-height: 1.6; -webkit-font-smoothing: antialiased; }
  a { color: inherit; text-decoration: none; }

  .nav {
    position: sticky; top: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px; gap: 8px;
    background: rgba(252,252,250,0.9); backdrop-filter: saturate(180%) blur(12px);
    border-bottom: 1px solid var(--line); overflow-x: auto;
  }
  .nav-logo { display: flex; align-items: center; gap: 6px; font-weight: 800; font-size: 14px; flex-shrink: 0; }
  .nav-logo img { height: 28px; width: auto; }
  .nav-links { display: flex; align-items: center; gap: 14px; flex-shrink: 0; }
  .nav-links a { font-size: 12.5px; font-weight: 600; color: var(--ink-3); white-space: nowrap; }
  .nav-links a:hover, .nav-links a.active { color: var(--accent); }
  .lang-switch { display: flex; gap: 3px; border: 1px solid var(--line); border-radius: 100px; padding: 2px; flex-shrink: 0; }
  .lang-btn { border: none; background: transparent; cursor: pointer; font-size: 11px; font-weight: 700; color: var(--ink-3); padding: 4px 8px; border-radius: 100px; }
  .lang-btn.active { background: var(--ink); color: white; }

  .qa-hero { padding: 36px 18px 16px; text-align: center; }
  .qa-tag { display: inline-block; font-size: 12px; font-weight: 700; color: var(--accent); background: var(--accent-light); padding: 5px 12px; border-radius: 100px; margin-bottom: 14px; }
  .qa-hero h1 { font-size: 1.8rem; font-weight: 800; letter-spacing: -0.02em; }
  .qa-hero h1 .accent { color: var(--accent); }
  .qa-hero p { margin: 12px auto 0; color: var(--ink-3); font-size: 0.95rem; max-width: 92%; }

  .guidelines { margin: 6px 16px 0; padding: 18px 18px; background: white; border: 1px solid var(--line); border-radius: var(--r-lg); box-shadow: var(--shadow-sm); }
  .guidelines h3 { font-size: 0.95rem; font-weight: 700; margin-bottom: 10px; }
  .guidelines ul { list-style: none; display: flex; flex-direction: column; gap: 9px; }
  .guidelines li { display: flex; gap: 8px; font-size: 0.88rem; color: var(--ink-2); }
  .guidelines li .dot { color: var(--accent); font-weight: 800; flex-shrink: 0; }

  .board { margin: 26px 16px 60px; }
  .board-label { font-size: 12px; font-weight: 700; color: var(--ink-3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; }
  .giscus-wrap { background: white; border: 1px solid var(--line); border-radius: var(--r-lg); box-shadow: var(--shadow-sm); padding: 6px; overflow: hidden; }
  .giscus-note { font-size: 0.82rem; color: var(--ink-3); text-align: center; padding: 24px 12px; }
  .giscus-note code { background: var(--paper-2); padding: 2px 6px; border-radius: 4px; font-size: 0.78rem; }

  .footer { text-align: center; padding: 30px 18px; border-top: 1px solid var(--line); color: var(--ink-3); font-size: 0.8rem; }
  .footer a { color: var(--accent); font-weight: 600; margin: 0 6px; }
  .footer img { height: 26px; margin-bottom: 12px; }
</style>
</head>
<body>

<nav class="nav">
  <a href="/mobile.html" class="nav-logo">
    <img src="/assets/snailai_logo.png" alt="蜗牛 AI Logo">
    <span>蜗牛 AI</span>
  </a>
  <div class="nav-links">
    <a href="/mobile.html#team">团队</a>
    <a href="/mobile.html#services">服务</a>
    <a href="/mobile.html#schedule">课程表</a>
    <a href="/mobile.html#videos">视频</a>
    <a href="/faq/mobile">FAQ</a>
    <a href="/mobile.html#all-links">链接大全</a>
    <a href="/qa/mobile.html" class="active">蜗牛问答</a>
    <div class="lang-switch">
      <button class="lang-btn active" data-lang="zh">中文</button>
      <button class="lang-btn" data-lang="en">EN</button>
    </div>
  </div>
</nav>

<header class="qa-hero">
  <span class="qa-tag">💬 学员专属问答看板</span>
  <h1>蜗牛<span class="accent">问答</span></h1>
  <p data-zh="学生提问，老师回答，同学互助评论。" data-en="Students ask, teachers answer, peers comment.">学生提问，老师回答，同学互助评论。</p>
</header>

<section class="guidelines">
  <h3>📌 使用公约</h3>
  <ul>
    <li><span class="dot">·</span><span data-zh="提问前先搜索，避免重复问题" data-en="Search before posting">提问前先搜索，避免重复问题</span></li>
    <li><span class="dot">·</span><span data-zh="描述清楚：你做了什么、卡在哪" data-en="Be specific">描述清楚：你做了什么、卡在哪</span></li>
    <li><span class="dot">·</span><span data-zh="友善讨论，互相帮助" data-en="Be kind, help each other">友善讨论，互相帮助</span></li>
  </ul>
</section>

<section class="board">
  <div class="board-label" data-zh="问答区" data-en="Q&A Board">问答区</div>
  <div class="giscus-wrap">
    <div class="giscus-note" id="giscus-loading">
      评论区加载中… 若长时间不显示，请确认仓库已开启 <code>Discussions</code> 并已安装 Giscus App。
    </div>
    <script src="https://giscus.app/client.js"
            data-repo="robin12300-SnailAI/robin12300-SnailAI.github.io"
            data-repo-id="R_kgDOTOPGsQ"
            data-category="Q&A"
            data-category-id="DIC_kwDOTOPGsc4DAqHJ"
            data-mapping="pathname"
            data-strict="0"
            data-reactions-enabled="1"
            data-emit-metadata="0"
            data-input-position="top"
            data-theme="light"
            data-lang="zh-CN"
            data-loading="lazy"
            crossorigin="anonymous"
            async>
    </script>
  </div>
</section>

<footer class="footer">
  <img src="/assets/snailai_logo.png" alt="蜗牛 AI">
  <div>

    <a href="/offline-course/mobile.html">线下课</a>

  <p style="margin-top:10px;">© 2026 蜗牛 AI · 澳洲华人 AI 应用教育学院</p>
</footer>

<script>
  (function () {
    var saved = localStorage.getItem('snailai-lang') || 'zh';
    function apply(lang) {
      document.querySelectorAll('[data-zh]').forEach(function (el) {
        el.textContent = el.getAttribute(lang === 'zh' ? 'data-zh' : 'data-en');
      });
      document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
      document.querySelectorAll('.lang-btn').forEach(function (b) {
        b.classList.toggle('active', b.getAttribute('data-lang') === lang);
      });
      var _tt = lang === 'en' ? document.documentElement.getAttribute('data-title-en') : document.documentElement.getAttribute('data-title-zh');
      if (_tt) document.title = _tt;
    }
    apply(saved);
    document.querySelectorAll('.lang-btn').forEach(function (btn) {
      btn.addEventListener('click', function () {
        var lang = btn.getAttribute('data-lang');
        localStorage.setItem('snailai-lang', lang);
        apply(lang);
      });
    });
  })();
</script>

<script src="/assets/analytics.js"></script>
</body>
</html>
