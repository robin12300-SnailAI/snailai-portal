<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 能力清单 · 蜗牛AI 学员学堂</title>
  <link rel="stylesheet" href="../assets/styles.css">
</head>
<body>
  <div id="nav-root"></div>
  <div id="announce-root"></div>

  <div class="wrap">
    <h2 class="section-title">✅ AI 能力清单</h2>
    <p class="section-sub">三项确认流程：<b>学员自查 → 助教初审 → 总讲师最终确认</b>。当前以 <b id="roleLabel"></b> 身份查看，你只能勾选自己那一列，其余列为只读。</p>

    <!-- 助教 / 讲师：学员选择 + 总览 -->
    <div id="staffBar"></div>
    <div id="overviewWrap"></div>

    <!-- 能力清单（学员视图 or 选中的学员）-->
    <div id="list"></div>

    <!-- 导出 / 导入 -->
    <div class="toolbar" id="ioBar" style="margin-top:24px;"></div>
  </div>

  <div id="foot-root"></div>

  <script src="../assets/data.js"></script>
  <script src="../assets/auth.js"></script>
  <script src="../assets/app.js"></script>
  <script>
    requireAuth();
    const user = getCurrentUser();
    const role = user.role;                                  // student | ta | instructor
    const isStaff = (role === "ta" || role === "instructor");
    const EDIT_COL = role === "student" ? "self" : role === "ta" ? "ta" : "final";
    const ROLE_NAME = { student: "学员", ta: "助教", instructor: "总讲师" };
    const students = USERS.filter(u => u.role === "student");
    const LS_KEY = "snailai_checklist_v1";

    /* ---------- 数据存储（localStorage，存于本浏览器）---------- */
    function loadChecks() {
      try { return JSON.parse(localStorage.getItem(LS_KEY) || "{}"); } catch (e) { return {}; }
    }
    let checks = loadChecks();
    function saveChecks() { localStorage.setItem(LS_KEY, JSON.stringify(checks)); }
    function getCap(username, capId) {
      return (checks[username] && checks[username][capId]) || { self: false, ta: false, final: false };
    }
    function setCap(username, capId, col, val) {
      checks[username] = checks[username] || {};
      checks[username][capId] = checks[username][capId] || { self: false, ta: false, final: false };
      checks[username][capId][col] = val;
      saveChecks();
    }

    let viewUser = (role === "student") ? user.username : (students[0] ? students[0].username : null);

    /* ---------- 状态徽标 ---------- */
    function capState(c) {
      if (c.self && c.ta && c.final) return { cls: "pass", txt: "✅ 已通过" };
      if (c.self && c.ta)           return { cls: "wait", txt: "🟡 初审通过" };
      if (c.self)                   return { cls: "wait", txt: "🔵 自查中" };
      return { cls: "none", txt: "未开始" };
    }

    /* ---------- 助教 / 讲师：学员选择器 ---------- */
    function renderStaffBar() {
      if (!isStaff) return;
      const opts = students.map(s =>
        `<option value="${s.username}" ${s.username === viewUser ? "selected" : ""}>${s.name}（${s.username}）</option>`).join("");
      document.getElementById("staffBar").innerHTML = `
        <div class="staff-bar">
          <span class="staff-label">查看学员：</span>
          <select id="studentSel">${opts}</select>
          <span class="staff-hint">你当前可勾选：<b>${EDIT_COL === "ta" ? "助教初审" : EDIT_COL === "final" ? "讲师终审" : "—"}</b></span>
        </div>`;
      document.getElementById("studentSel").addEventListener("change", e => {
        viewUser = e.target.value;
        renderList(); renderOverview(); renderStaffBar();
      });
    }

    /* ---------- 助教 / 讲师：学员总览表 ---------- */
    function renderOverview() {
      if (!isStaff) return;
      const total = CAPABILITIES.length;
      const rows = students.map(s => {
        let self = 0, ta = 0, fin = 0;
        CAPABILITIES.forEach(c => {
          const st = getCap(s.username, c.id);
          if (st.self) self++; if (st.ta) ta++; if (st.final) fin++;
        });
        return `<tr data-u="${s.username}" class="${s.username === viewUser ? "active" : ""}">
          <td>${s.name}</td>
          <td>${self}/${total}</td>
          <td>${ta}/${total}</td>
          <td>${fin}/${total}</td>
          <td>${Math.round(fin / total * 100)}%</td>
        </tr>`;
      }).join("");
      document.getElementById("overviewWrap").innerHTML = `
        <div class="overview">
          <h3 class="catalog-title" style="margin-top:4px;">📊 学员总览（${students.length} 人）</h3>
          <table class="ov-table">
            <thead><tr><th>学员</th><th>自查</th><th>初审</th><th>最终</th><th>通过率</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>`;
      document.querySelectorAll("#overviewWrap tbody tr").forEach(tr => {
        tr.addEventListener("click", () => { viewUser = tr.dataset.u; renderList(); renderOverview(); renderStaffBar(); });
      });
    }

    /* ---------- 能力清单（按类别分组，含 3 勾选）---------- */
    function renderList() {
      if (!viewUser) {
        document.getElementById("list").innerHTML = `<div class="pending">暂无学员数据</div>`;
        return;
      }
      const groups = {};
      CAPABILITIES.forEach(c => { (groups[c.category] = groups[c.category] || []).push(c); });
      let n = 0, html = "";
      Object.keys(groups).forEach(cat => {
        html += `<div class="cap-cat"><h3>${cat}</h3>`;
        groups[cat].forEach(c => {
          n++;
          const st = capState(getCap(viewUser, c.id));
          const canSelf = EDIT_COL === "self";
          const canTa = EDIT_COL === "ta";
          const canFinal = EDIT_COL === "final";
          html += `
            <div class="cap-item">
              <div class="cap-head">
                <div>
                  <div class="cap-name"><span class="cap-no">${n}</span>${c.name}</div>
                  <div class="cap-desc">${c.desc}</div>
                </div>
                <span class="cap-status ${st.cls}">${st.txt}</span>
              </div>
              <div class="cap-checks">
                <label><input type="checkbox" data-cap="${c.id}" data-col="self" ${getCap(viewUser, c.id).self ? "checked" : ""} ${canSelf ? "" : "disabled"}> 学员自查</label>
                <label class="teacher"><input type="checkbox" data-cap="${c.id}" data-col="ta" ${getCap(viewUser, c.id).ta ? "checked" : ""} ${canTa ? "" : "disabled"}> 助教初审</label>
                <label class="teacher"><input type="checkbox" data-cap="${c.id}" data-col="final" ${getCap(viewUser, c.id).final ? "checked" : ""} ${canFinal ? "" : "disabled"}> 讲师终审</label>
              </div>
            </div>`;
        });
        html += `</div>`;
      });
      document.getElementById("list").innerHTML = html;
      document.querySelectorAll("#list input[type=checkbox]").forEach(cb => {
        cb.addEventListener("change", e => {
          const capId = e.target.dataset.cap;
          const col = e.target.dataset.col;
          setCap(viewUser, capId, col, e.target.checked);
          renderList();
          if (isStaff) renderOverview();
        });
      });
    }

    /* ---------- 导出 / 导入（跨设备桥梁）---------- */
    function renderIO() {
      document.getElementById("ioBar").innerHTML = `
        <button class="btn btn-ghost btn-sm" id="expBtn">⬇️ 导出备份 (JSON)</button>
        <button class="btn btn-ghost btn-sm" id="impBtn">⬆️ 导入备份</button>
        <input type="file" id="impFile" accept="application/json" style="display:none">
        <span class="io-note">数据保存在本浏览器，换设备 / 清缓存会丢失，建议定期导出；多人协作可用「导入」合并彼此的备份。</span>`;
      document.getElementById("expBtn").onclick = exportJSON;
      document.getElementById("impBtn").onclick = () => document.getElementById("impFile").click();
      document.getElementById("impFile").onchange = importJSON;
    }
    function exportJSON() {
      const blob = new Blob([JSON.stringify(checks, null, 2)], { type: "application/json" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "snailai_checklist_" + new Date().toISOString().slice(0, 10) + ".json";
      a.click();
      URL.revokeObjectURL(a.href);
    }
    function importJSON(e) {
      const f = e.target.files[0]; if (!f) return;
      const r = new FileReader();
      r.onload = () => {
        try {
          const data = JSON.parse(r.result);
          Object.keys(data).forEach(u => {
            checks[u] = checks[u] || {};
            Object.keys(data[u]).forEach(capId => {
              checks[u][capId] = Object.assign(checks[u][capId] || { self: false, ta: false, final: false }, data[u][capId]);
            });
          });
          saveChecks();
          renderStaffBar(); renderOverview(); renderList();
          alert("导入成功，已与本地备份合并。");
        } catch (err) { alert("导入失败：文件格式不正确。"); }
      };
      r.readAsText(f);
    }

    /* ---------- 初始化 ---------- */
    document.getElementById("roleLabel").textContent = ROLE_NAME[role];
    renderIO();
    renderStaffBar();
    renderOverview();
    renderList();

    initPortal("checklist");
  </script>
</body>
</html>
