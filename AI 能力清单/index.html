<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 能力清单 · 蜗牛AI 学员学堂</title>
  <link rel="stylesheet" href="../assets/styles.css">
  <style>
    .wecom-cta {
      display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px;
      background:linear-gradient(135deg,#e8f5e9,#f1f8e9);
      border:1px solid var(--green-200, #c8e6c9);
      border-radius:14px; padding:18px 20px; margin-bottom:22px;
    }
    .wecom-cta .txt { font-size:15px; color:#2e7d32; }
    .wecom-cta .txt b { color:#1b5e20; }
    .cap-cat { margin-bottom:26px; }
    .cap-cat > h3 {
      font-size:16px; color:var(--green-700,#2e7d32);
      border-left:4px solid var(--green-500,#4caf50); padding-left:10px; margin:0 0 12px;
    }
    .cap-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:12px; }
    .cap-item {
      background:#fff; border:1px solid var(--border,#e5e7eb); border-radius:12px;
      padding:14px 16px; transition:box-shadow .15s,transform .15s;
    }
    .cap-item:hover { box-shadow:0 4px 16px rgba(0,0,0,.07); transform:translateY(-1px); }
    .cap-name { font-weight:600; color:var(--gray-800,#1f2937); margin-bottom:6px; display:flex; align-items:center; gap:8px; }
    .cap-no {
      display:inline-flex; align-items:center; justify-content:center;
      width:24px; height:24px; border-radius:7px; background:var(--green-50,#e8f5e9);
      color:var(--green-700,#2e7d32); font-size:12px; font-weight:700; flex:none;
    }
    .cap-desc { font-size:13.5px; color:var(--gray-600,#6b7280); line-height:1.6; }
  </style>
</head>
<body>
  <div id="nav-root"></div>
  <div id="announce-root"></div>

  <div class="wrap">
    <h2 class="section-title">✅ AI 能力清单</h2>
    <p class="section-sub">下面是每位学员都应掌握的 AI 能力。勾选「自查 / 初审 / 最终确认」三步确认请在 <b>企业微信智能表格</b> 完成，本页仅作能力项展示。</p>

    <!-- 企业微信入口（把链接填到下面 WECHAT_SHEET_URL 即可）-->
    <div class="wecom-cta">
      <div class="txt">👉 前往 <b>企业微信智能表格</b> 完成你的能力确认（学员自查 → 助教初审 → 总讲师最终确认）</div>
      <a class="btn btn-primary" id="wecomBtn" href="#">前往企业微信 →</a>
    </div>

    <div id="list"></div>
  </div>

  <div id="foot-root"></div>

  <script src="../assets/data.js"></script>
  <script src="../assets/auth.js"></script>
  <script src="../assets/app.js"></script>
  <script>
    // ===== 企业微信智能表格链接（上线前在此粘贴真实链接）=====
    const WECHAT_SHEET_URL = "";   // 例："https://doc.weixin.qq.com/..."
    // =======================================================
    requireAuth();
    const user = getCurrentUser();

    // 企业微信按钮：有链接则跳转，否则提示联系助教
    (function () {
      const btn = document.getElementById("wecomBtn");
      if (WECHAT_SHEET_URL) {
        btn.href = WECHAT_SHEET_URL;
        btn.target = "_blank";
      } else {
        btn.href = "#";
        btn.textContent = "联系助教获取链接";
        btn.onclick = function (e) {
          e.preventDefault();
          alert("企业微信智能表格链接尚未配置，请联系助教获取。");
        };
      }
    })();

    // 渲染能力项（只读，按类别分组）
    (function renderList() {
      const groups = {};
      CAPABILITIES.forEach(c => { (groups[c.category] = groups[c.category] || []).push(c); });
      let html = "";
      let n = 0;
      Object.keys(groups).forEach(cat => {
        html += `<div class="cap-cat"><h3>${cat}</h3><div class="cap-grid">`;
        groups[cat].forEach(c => {
          n++;
          html += `
            <div class="cap-item">
              <div class="cap-name"><span class="cap-no">${n}</span>${c.name}</div>
              <div class="cap-desc">${c.desc}</div>
            </div>`;
        });
        html += `</div></div>`;
      });
      document.getElementById("list").innerHTML = html;
    })();

    initPortal("checklist");
  </script>
</body>
</html>
