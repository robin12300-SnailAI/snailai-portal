<!DOCTYPE html>
<html lang="zh-CN" data-title-zh="课时详情 · 蜗牛AI 学员学堂" data-title-en="Lesson Detail · SnailAI Portal">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>课时详情 · 蜗牛AI 学员学堂</title>
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
  <div class="lang-switch">
    <button class="lang-btn active" data-lang="zh">中文</button>
    <button class="lang-btn" data-lang="en">EN</button>
  </div>

  <div id="nav-root"></div>
  <div id="announce-root"></div>

  <div class="wrap">
    <a class="btn btn-ghost btn-sm" id="backLink" href="#">← 返回课程</a>
    <h2 class="section-title" id="lTitle" style="margin-top:14px;"></h2>
    <p class="section-sub" id="lDesc"></p>

    <!-- PPT 查看器 -->
    <div class="viewer" style="margin-bottom:28px;">
      <div class="viewer-bar">
        <strong id="viewerTitle">课程 PPT</strong>
        <div class="viewer-nav">
          <button onclick="prevSlide()">‹ 上一张</button>
          <span id="pageInfo" style="font-size:13px;color:var(--gray-600);"></span>
          <button onclick="nextSlide()">下一张 ›</button>
        </div>
      </div>
      <div class="viewer-stage" id="stage"></div>
      <div class="viewer-thumbs" id="thumbs"></div>
    </div>

    <!-- 课程视频 -->
    <h3 class="section-title" style="font-size:18px;margin-top:8px;">📺 课程视频</h3>
    <div id="videos" style="margin-top:12px;margin-bottom:20px;"></div>

    <!-- 资料下载 -->
    <h3 class="section-title" style="font-size:18px;">📎 <span id="matTitle">配套资料</span></h3>
    <div id="materials" style="margin-top:12px;"></div>
  </div>

  <div id="foot-root"></div>

  <script src="assets/data.js"></script>
  <script src="assets/auth.js"></script>
  <script src="assets/app.js"></script>
  <script>
    requireAuth();
    const L_ = (zh, en) => curLang === "en" ? en : zh;
    const params = new URLSearchParams(location.search);
    const courseId = params.get("course") || "online";
    const lessonId = params.get("lesson") || "l01";
    const course = COURSES[courseId];
    let lesson = null;
    course.modules.forEach(m => m.lessons.forEach(l => { if (l.id === lessonId) lesson = l; }));

    if (!lesson) { document.body.innerHTML = "<p style='padding:40px'>" + L_("未找到该课时", "Lesson not found") + "</p>"; }

    document.getElementById("backLink").href =
      (courseId === "online" ? "AI 应用线上班/" : "AI 财富线下班/") + "index.html";

    function fileIcon(m) {
      const f = m.file || "";
      const nm = (m.name || "").toLowerCase();
      if (/^https?:\/\//i.test(f)) {
        if (nm.includes("视频")) return "🎬";
        if (nm.includes("音频")) return "🎵";
        if (nm.includes("pdf")) return "📕";
        if (nm.includes("图片") || nm.includes("png") || nm.includes("jpg")) return "🖼️";
        if (nm.includes("word") || nm.includes("docx") || nm.includes("讲座")) return "📘";
        return "☁️";
      }
      const e = (f.split(".").pop() || "").toLowerCase();
      if (e === "pdf") return "📕"; if (["doc","docx"].includes(e)) return "📘";
      if (["zip","rar"].includes(e)) return "🗜️"; if (["png","jpg","jpeg"].includes(e)) return "🖼️";
      if (["mp3","m4a","wav","aac"].includes(e)) return "🎵";
      if (["mp4","mov","avi","webm"].includes(e)) return "🎬";
      return "📄";
    }

    function renderAll() {
      if (!lesson) return;
      document.getElementById("lTitle").textContent = (lessonId.replace("l", "")) + ". " + lesson.title;
      document.getElementById("lDesc").textContent = lesson.desc + " · " + lesson.duration;
      document.getElementById("backLink").textContent = "← " + L_("返回课程", "Back to Course");
      document.getElementById("viewerTitle").textContent = L_("课程 PPT", "Course Slides");
      document.getElementById("matTitle").textContent = lesson.materialsTitle || L_("配套资料", "Materials");

      /* ---------- 资料 ---------- */
      const mats = lesson.materials || [];
      const box = document.getElementById("materials");
      if (mats.length === 0) {
        box.innerHTML = `<div class="pending">📭 ${L_("配套资料待上传", "Materials to be uploaded")}</div>`;
      } else {
        box.innerHTML = mats.map(m => {
          const isUrl = /^https?:\/\//i.test(m.file || "");
          const sub = isUrl ? "☁️ Google 云端硬盘" : m.file.split("/").pop();
          return `
          <div class="material">
            <div class="fi">${fileIcon(m)}</div>
            <div class="mt"><b>${m.name}</b><span>${sub}</span></div>
            <a class="btn btn-primary btn-sm" href="${m.file}" target="_blank" rel="noopener">${L_("下载", "Download")}</a>
          </div>`;
        }).join("");
      }

      /* ---------- 课程视频（YouTube 内嵌）---------- */
      const vids = lesson.videos || [];
      const vbox = document.getElementById("videos");
      if (vids.length === 0) {
        vbox.innerHTML = `<div class="pending">📭 ${L_("本节视频待上传", "Video to be uploaded")}</div>`;
      } else {
        vbox.innerHTML = vids.map(v => `
          <div class="video-item">
            <div class="video-title">${v.title || L_("课程视频", "Course Video")}</div>
            ${ytEmbedHtml(v.url, v.title)}
          </div>`).join("");
      }
    }

    /* ---------- PPT 查看器（图片，无需随语言重渲染）---------- */
    let idx = 0;
    const slides = lesson.slides || [];
    const stage = document.getElementById("stage");
    const thumbs = document.getElementById("thumbs");

    if (slides.length === 0) {
      stage.innerHTML = `<div class="empty">📭 ${L_("PPT 待上传", "Slides to be uploaded")}<br><br>${L_("老师会把本节课的 PPT 导出为图片放进来，", "The teacher will export this lesson's PPT as images and drop them in —")}<br>${L_("届时刷新即可在线翻看。", "refresh to view online.")}</div>`;
      document.getElementById("pageInfo").textContent = "";
    } else {
      slides.forEach((src, i) => {
        const img = document.createElement("img");
        img.src = src; img.onclick = () => goSlide(i);
        thumbs.appendChild(img);
      });
      renderSlide();
    }

    function renderSlide() {
      stage.innerHTML = `<img src="${slides[idx]}" alt="slide ${idx + 1}">`;
      document.getElementById("pageInfo").textContent = `${idx + 1} / ${slides.length}`;
      [...thumbs.children].forEach((t, i) => t.classList.toggle("active", i === idx));
    }
    function goSlide(i) { idx = Math.max(0, Math.min(slides.length - 1, i)); renderSlide(); }
    function prevSlide() { if (slides.length) goSlide(idx - 1); }
    function nextSlide() { if (slides.length) goSlide(idx + 1); }
    document.addEventListener("keydown", e => {
      if (e.key === "ArrowLeft") prevSlide();
      if (e.key === "ArrowRight") nextSlide();
    });

    renderAll();
    initPortal(courseId === "online" ? "online" : "offline");
    setLang(curLang);
    window.addEventListener("langchange", renderAll);
  </script>
</body>
</html>
