<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>学员登录 · 蜗牛AI 学员学堂</title>
  <script>
    // 双保险：若旧 GitHub Pages 站仍被访问，自动跳转到 Render 后端地址
    if (location.hostname.indexOf('github.io') !== -1) {
      location.replace('https://snailai-portal-1.onrender.com/login.html');
    }
  </script>
  <style>
    :root{--paper:#FCFCFA;--ink:#1A1A2E;--ink2:#4a4a5e;--ink3:#8a8a9a;
      --line:#e6e6ec;--accent:#FF5B1F;--accent-soft:#fff1ea;
      --green:#10b981;--green-bg:#e7f8f1;--radius:14px;
      --shadow:0 2px 8px rgba(26,26,46,.06);--shadow-lg:0 8px 32px rgba(26,26,46,.10)}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",system-ui,sans-serif;
      background:var(--paper);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased;
      min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .card{background:#fff;border:1px solid var(--line);border-radius:var(--radius);
      box-shadow:var(--shadow-lg);padding:40px 34px;width:100%;max-width:400px;text-align:center}
    .logo{font-size:42px;margin-bottom:6px}
    h1{font-size:22px;font-weight:800;margin-bottom:4px}
    .sub{font-size:14px;color:var(--ink3);margin-bottom:28px}
    .field{text-align:left;margin-bottom:16px}
    .field label{display:block;font-size:13px;color:var(--ink2);margin-bottom:6px;font-weight:600}
    .field input{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:10px;
      font-size:15px;font-family:inherit;transition:.15s;background:var(--paper)}
    .field input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
    .btn{display:block;width:100%;padding:13px;border:none;border-radius:10px;font-size:16px;
      font-weight:700;cursor:pointer;transition:.15s;font-family:inherit}
    .btn-primary{background:var(--accent);color:#fff;margin-top:6px}
    .btn-primary:hover{filter:brightness(1.05);transform:translateY(-1px)}
    .btn-primary:disabled{opacity:.6;cursor:not-allowed;transform:none}
    .err{color:#ef4444;font-size:13px;margin-top:10px;min-height:18px;text-align:left}
    .spinner{display:inline-block;width:16px;height:16px;border:2.5px solid #fff;
      border-top-color:transparent;border-radius:50%;animation:.6s linear infinite spin;vertical-align:-3px;margin-right:6px}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🐌</div>
    <h1>学员登录</h1>
    <p class="sub">SnailAI 学员学堂 · 课程回顾与资料中心</p>

    <form id="f" onsubmit="return doLogin(event)">
      <div class="field">
        <label for="u">用户名</label>
        <input id="u" type="text" placeholder="请输入用户名" autocomplete="username" required autofocus>
      </div>
      <div class="field">
        <label for="p">密码</label>
        <input id="p" type="password" placeholder="请输入密码" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn btn-primary" id="btn">登 录</button>
      <div class="err" id="err"></div>
    </form>
  </div>

  <script>
    const S_KEY = "snailai_api_token";
    const U_KEY = "snailai_me";
    // 已有 token → 直接进欢迎页（一次登录）
    if (sessionStorage.getItem(S_KEY)) { location.href = "welcome.html"; }

    async function doLogin(e) {
      e.preventDefault();
      const u = document.getElementById("u").value.trim();
      const p = document.getElementById("p").value;
      const btn = document.getElementById("btn");
      const err = document.getElementById("err");
      err.textContent = "";
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>登录中...';

      try {
        const r = await fetch("/api/login", {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({username: u, password: p})
        });
        const d = await r.json();
        if (!d.ok) throw new Error(d.error || "用户名或密码错误");

        // 存共享 session key（矩阵页也读这个）
        sessionStorage.setItem(S_KEY, d.token);
        sessionStorage.setItem(U_KEY, JSON.stringify(d.user));
        location.href = "welcome.html";
      } catch(ex) {
        err.textContent = ex.message;
        btn.disabled = false;
        btn.innerHTML = "登 录";
      }
      return false;
    }
  </script>
</body>
</html>
