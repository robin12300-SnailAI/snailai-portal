services:
  - type: web
    name: snailai-portal-1
    runtime: python
    region: singapore
    plan: starter
    branch: main
    rootDir: server
    buildCommand: pip install -r requirements.txt
    # 单 worker：API 限流为进程内内存实现（滑动窗口 dict），多 worker 不共享状态会失效；
    # 当前学员规模单 worker 足够。若未来需多 worker 并发，请改用 Redis 共享限流。
    startCommand: gunicorn -w 1 -b 0.0.0.0:$PORT app:app
    healthCheckPath: /
    disk:
      name: snailai-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: DB_PATH
        value: /data/snailai.db
      - key: PYTHON_VERSION
        value: "3.13"
      - key: WECHAT_WEBHOOK_URL
        sync: false

# deployed on Starter plan with persistent disk
