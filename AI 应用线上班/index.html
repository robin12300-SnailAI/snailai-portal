<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 应用线上班 · 蜗牛AI 学员学堂</title>
  <link rel="stylesheet" href="../assets/styles.css">
</head>
<body>
  <div id="nav-root"></div>
  <div id="announce-root"></div>

  <div class="wrap">
    <h2 class="section-title" id="cTitle">AI 应用线上班</h2>
    <p class="section-sub" id="cDesc"></p>

    <!-- 📋 课程目录 -->
    <div class="course-catalog" id="catalog"></div>

    <div id="prepBanner" style="margin:18px 0 8px;"></div>
    <div id="modules"></div>
  </div>

  <div id="foot-root"></div>

  <script src="../assets/data.js"></script>
  <script src="../assets/auth.js"></script>
  <script src="../assets/app.js"></script>
  <script>
    requireAuth();
    const course = COURSES.online;
    document.getElementById("cTitle").textContent = course.cover + " " + course.name;
    document.getElementById("cDesc").textContent = course.desc;

    // 课前预习视频
    document.getElementById("prepBanner").innerHTML = `
      <div class="video-item">
        <div class="video-title">▶ ${PREP_VIDEO.title}</div>
        ${ytEmbedHtml(PREP_VIDEO.url, PREP_VIDEO.title)}
      </div>`;

    /* ---------- 📋 课程目录 ---------- */
    (function renderCatalog() {
      const container = document.getElementById("catalog");
      let lessonIdx = 0;
      let catalogHtml = `<h3 class="catalog-title">📋 课程目录（共 ${course.modules.reduce((s,m)=>s+m.lessons.length,0)} 节课）</h3><div class="catalog-list">`;
      course.modules.forEach(mod => {
        mod.lessons.forEach(ls => {
          lessonIdx++;
          const chs = ls.chapters || [];
          const hasContent = chs.length > 0;
          catalogHtml += `
            <details class="catalog-lesson" ${lessonIdx === 1 ? "open" : ""}>
              <summary class="catalog-summary">
                <span class="catalog-num">${lessonIdx}</span>
                <span class="catalog-name">${ls.title}</span>
                <span class="catalog-dur">${ls.duration}</span>
                <span class="catalog-arrow">▸</span>
              </summary>
              ${hasContent ? `<div class="catalog-chapters"><ol>${chs.map(c => `<li>${c}</li>`).join("")}</ol></div>` :
                `<div class="catalog-empty">📝 目录待更新，老师会在课前发布本节详细内容</div>`}
            </details>`;
        });
      });
      catalogHtml += `</div>`;
      container.innerHTML = catalogHtml;
    })();

    const p = navPrefix();
    function matIcon(m) {
      const f = m.file || "", nm = (m.name || "").toLowerCase();
      if (/^https?:\/\//i.test(f)) {
        if (nm.includes("视频")) return "🎬";
        if (nm.includes("音频")) return "🎵";
        if (nm.includes("pdf")) return "📕";
        if (nm.includes("图片") || nm.includes("png") || nm.includes("jpg")) return "🖼️";
        if (nm.includes("word") || nm.includes("docx") || nm.includes("讲座")) return "📘";
        return "☁️";
      }
      const e = (f.split(".").pop() || "").toLowerCase();
      if (e === "pdf") return "📕"; if (["doc","docx"].includes(e)) return "📘";
      if (["zip","rar"].includes(e)) return "🗜️"; if (["png","jpg","jpeg"].includes(e)) return "🖼️";
      if (["mp3","m4a","wav","aac"].includes(e)) return "🎵";
      if (["mp4","mov","avi","webm"].includes(e)) return "🎬";
      return "📄";
    }
    let html = "";
    course.modules.forEach(mod => {
      html += `<div class="module"><h3>${mod.title}</h3>`;
      mod.lessons.forEach(ls => {
        const hasSlides = ls.slides && ls.slides.length > 0;
        const mats = ls.materials || [];
        const hasMats = mats.length > 0;
        const ready = hasSlides || hasMats;
        const matTitle = ls.materialsTitle || "配套资料";
        html += `
          <a class="lesson" href="${p}lesson.html?course=online&lesson=${ls.id}">
            <div class="num">${ls.id.replace("l", "")}</div>
            <div class="info">
              <h4>${ls.title}</h4>
              <p>${ls.desc}</p>
            </div>
            <div class="dur">${ls.duration}</div>
            <div class="badge ${ready ? "ready" : ""}">${ready ? (hasMats ? "📎 可下载" : "有课件") : "资料准备中"}</div>
          </a>`;
        // 有 materials 时在卡片下方直接嵌下载列表（默认展开第一堂课）
        if (hasMats) {
          const isOpen = ls.id === "l01" ? " open" : "";
          html += `<details class="catalog-lesson mat-block${isOpen}" style="margin:6px 0 16px;padding:12px 14px;background:var(--surface);border-radius:10px;border:1px solid var(--border)">
            <summary style="cursor:pointer;font-weight:600;color:var(--primary);font-size:15px">📎 ${matTitle}（${mats.length} 个文件）</summary>
            <div style="margin-top:10px;display:flex;flex-direction:column;gap:8px">
              ${mats.map(m => `
                <div style="display:flex;align-items:center;gap:10px;padding:8px 10px;background:rgba(255,255,255,.6);border-radius:8px">
                  <span style="font-size:20px;flex-shrink:0">${matIcon(m)}</span>
                  <span style="flex:1;min-width:0"><b style="font-size:13px">${m.name}</b><br><span style="font-size:11px;color:var(--gray-500)">${/^https?:\/\//i.test(m.file)?"☁️ Google 云端硬盘":m.file.split("/").pop()}</span></span>
                  <a class="btn btn-primary btn-sm" href="${m.file}" target="_blank" rel="noopener" style="white-space:nowrap;flex-shrink:0">⬇ 下载</a>
                </div>`).join("")}
            </div>
          </details>`;
        }
      });
      html += `</div>`;
    });
    document.getElementById("modules").innerHTML = html;

    initPortal("online");
  </script>
</body>
</html>
