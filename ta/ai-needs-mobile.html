<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 刚需看板 — 蜗牛AI</title>
<style>
  :root {
    --accent: #ff5b1f; --accent-2: #e04a10; --accent-light: rgba(255,91,31,.10);
    --ink: #1a1a2e; --ink-2: #3a3a50; --ink-3: #6b6b80;
    --paper: #ffffff; --paper-2: #f8f8fa; --line: #e8e8ee;
    --r-md: 8px; --r-lg: 14px; --r-xl: 20px;
    --shadow-sm: 0 1px 4px rgba(0,0,0,.06);
    --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--sans); background: var(--paper-2); color: var(--ink); min-height: 100vh; padding-bottom: 90px; }

  /* ===== Top Nav ===== */
  .topnav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: var(--paper); border-bottom: 1px solid var(--line); display: flex; align-items: center; padding: 0 16px; height: 56px; box-shadow: var(--shadow-sm); }
  .topnav .back { font-size: 20px; color: var(--ink-2); text-decoration: none; margin-right: 12px; }
  .topnav .title { font-size: 16px; font-weight: 700; flex: 1; }
  .topnav .lang-btn { background: var(--paper-2); border: 1px solid var(--line); border-radius: 100px; padding: 3px 10px; font-size: 11px; cursor: pointer; color: var(--ink-2); }

  /* ===== Page ===== */
  .page { padding: 72px 14px 20px; }
  .page-head { margin-bottom: 18px; }
  .page-head h1 { font-size: 22px; letter-spacing: -0.02em; }
  .page-head p { color: var(--ink-3); margin-top: 4px; font-size: 13px; }

  /* ===== Toolbar ===== */
  .toolbar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .toolbar input[type=text] {
    flex: 1; min-width: 120px; padding: 9px 14px; border: 1px solid var(--line); border-radius: 100px;
    font-size: 13px; background: var(--paper); color: var(--ink);
  }
  .toolbar input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light); }
  .toolbar select {
    padding: 9px 10px; border: 1px solid var(--line); border-radius: var(--r-md); font-size: 13px; background: var(--paper); color: var(--ink);
  }
  .btn-accent {
    padding: 9px 16px; background: var(--accent); color: #fff; border: none; border-radius: 100px;
    font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap;
  }
  .btn-accent:hover { background: var(--accent-2); }

  /* ===== Stats ===== */
  .stats { display: flex; gap: 10px; margin-bottom: 18px; }
  .stat-card { flex: 1; background: var(--paper); border: 1px solid var(--line); border-radius: var(--r-lg); padding: 14px 16px; text-align: center; box-shadow: var(--shadow-sm); }
  .stat-card .num { font-size: 24px; font-weight: 800; color: var(--accent); }
  .stat-card .label { font-size: 11px; color: var(--ink-3); margin-top: 2px; }

  /* ===== Student Group ===== */
  .student-group { background: var(--paper); border: 1px solid var(--line); border-radius: var(--r-xl); margin-bottom: 14px; box-shadow: var(--shadow-sm); overflow: hidden; }
  .student-header {
    display: flex; align-items: center; gap: 10px; padding: 16px 18px; cursor: pointer; user-select: none;
  }
  .student-header:hover { background: var(--paper-2); }
  .student-avatar {
    width: 36px; height: 36px; border-radius: 50%; background: var(--accent-light); color: var(--accent);
    display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; flex-shrink: 0;
  }
  .student-info { flex: 1; }
  .student-info .name { font-size: 14px; font-weight: 700; }
  .student-info .username { font-size: 12px; color: var(--ink-3); }
  .student-count { font-size: 12px; color: var(--ink-3); background: var(--paper-2); padding: 3px 10px; border-radius: 100px; }
  .student-arrow { font-size: 16px; color: var(--ink-3); transition: transform .3s; }
  .student-group.open .student-arrow { transform: rotate(180deg); }
  .student-needs { display: none; padding: 0 18px 16px; }
  .student-group.open .student-needs { display: block; }

  /* ===== Need Card ===== */
  .need-card {
    background: var(--paper-2); border: 1px solid var(--line); border-radius: var(--r-lg); padding: 14px 16px; margin-bottom: 10px;
  }
  .need-card:last-child { margin-bottom: 0; }
  .need-card .nc-head { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; flex-wrap: wrap; }
  .need-card .nc-seq { font-size: 11px; color: var(--ink-3); background: var(--paper); border: 1px solid var(--line); border-radius: 100px; padding: 1px 8px; font-weight: 600; }
  .need-card .nc-title { font-size: 14px; font-weight: 700; flex: 1; }
  .priority-tag { font-size: 10px; font-weight: 700; padding: 1px 8px; border-radius: 100px; }
  .priority-tag.high { background: #fee2e2; color: #dc2626; }
  .priority-tag.mid { background: #fef3c7; color: #d97706; }
  .priority-tag.low { background: #d1fae5; color: #059669; }
  .need-card .nc-category { font-size: 11px; color: var(--accent); background: var(--accent-light); padding: 1px 8px; border-radius: 100px; }
  .need-card .nc-content { font-size: 13px; color: var(--ink-2); line-height: 1.6; margin-bottom: 8px; white-space: pre-wrap; }
  .need-card .nc-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 8px; }
  .need-card .nc-tag { font-size: 10px; color: var(--ink-3); background: var(--paper); border: 1px solid var(--line); border-radius: 100px; padding: 1px 8px; }
  .need-card .nc-meta { font-size: 11px; color: var(--ink-3); display: flex; gap: 12px; }
  .need-card .nc-actions { margin-top: 10px; display: flex; gap: 6px; }
  .btn-sm { font-size: 11px; padding: 4px 12px; border-radius: 100px; border: 1px solid var(--line); background: var(--paper); cursor: pointer; color: var(--ink-2); }
  .btn-sm:hover { border-color: var(--accent); color: var(--accent); }
  .btn-sm.danger:hover { border-color: #dc2626; color: #dc2626; }

  /* ===== Modal ===== */
  .modal-overlay {
    display: none; position: fixed; inset: 0; z-index: 200; background: rgba(26,26,46,.5); backdrop-filter: blur(4px);
    align-items: flex-end; justify-content: center; padding: 0;
  }
  .modal-overlay.open { display: flex; }
  .modal-box { background: var(--paper); border-radius: var(--r-xl) var(--r-xl) 0 0; width: 100%; max-width: 500px; padding: 28px 20px 36px; box-shadow: var(--shadow-md); position: relative; max-height: 90vh; overflow-y: auto; }
  .modal-close { position: absolute; top: 12px; right: 16px; border: none; background: none; font-size: 22px; cursor: pointer; color: var(--ink-3); }
  .modal-box h2 { font-size: 18px; margin-bottom: 4px; }
  .modal-box > p { font-size: 13px; color: var(--ink-3); margin-bottom: 16px; }
  .modal-form label { display: block; font-size: 12px; font-weight: 700; color: var(--ink-2); margin-bottom: 3px; margin-top: 12px; }
  .modal-form label:first-child { margin-top: 0; }
  .modal-form input, .modal-form textarea, .modal-form select {
    width: 100%; padding: 10px 12px; border: 1px solid var(--line); border-radius: var(--r-md);
    font-size: 14px; font-family: var(--sans); background: var(--paper); color: var(--ink);
  }
  .modal-form input:focus, .modal-form textarea:focus, .modal-form select:focus {
    outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light);
  }
  .modal-form textarea { min-height: 70px; resize: vertical; }
  .modal-form .hint { font-size: 11px; color: var(--ink-3); margin-top: 4px; }
  .modal-submit { margin-top: 16px; width: 100%; padding: 12px; background: var(--accent); color: #fff; border: none; border-radius: 100px; font-size: 15px; font-weight: 700; cursor: pointer; }
  .modal-submit:hover { background: var(--accent-2); }
  .modal-status { font-size: 12px; margin-top: 8px; min-height: 16px; }

  /* ===== Empty ===== */
  .empty { text-align: center; padding: 40px 20px; color: var(--ink-3); }
  .empty .ico { font-size: 36px; margin-bottom: 12px; }
  .empty p { font-size: 14px; }

  /* ===== Bottom Nav ===== */
  .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; z-index: 100; background: var(--paper); border-top: 1px solid var(--line); display: flex; justify-content: space-around; padding: 8px 0 12px; }
  .bottom-nav a { text-decoration: none; color: var(--ink-3); font-size: 11px; display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .bottom-nav a .nav-ico { font-size: 20px; }
  .bottom-nav a.active { color: var(--accent); }
</style>
</head>
<body>

<!-- Top Nav -->
<nav class="topnav">
  <a class="back" href="mobile.html">←</a>
  <div class="title" data-zh="AI 刚需看板" data-en="AI Needs Board">AI 刚需看板</div>
  <button class="lang-btn" id="langBtn">EN</button>
</nav>

<div class="page">
  <div class="page-head">
    <h1 data-zh="AI 刚需看板" data-en="AI Needs Board">AI 刚需看板</h1>
    <p data-zh="所有学员 · 助教/管理员可帮学员新建" data-en="All students · TA/Admin can create needs">所有学员 · 助教/管理员可帮学员新建</p>
  </div>

  <div class="toolbar">
    <input type="text" id="searchInput" placeholder="搜索学员…" data-zh-ph="搜索学员…" data-en-ph="Search student…">
    <select id="priorityFilter">
      <option value="" data-zh="全部" data-en="All">全部</option>
      <option value="高" data-zh="高" data-en="High">高</option>
      <option value="中" data-zh="中" data-en="Med">中</option>
      <option value="低" data-zh="低" data-en="Low">低</option>
    </select>
    <button class="btn-accent" id="openCreateBtn" data-zh="➕ 新建" data-en="➕ New">➕ 新建</button>
  </div>

  <div class="stats" id="statsRow">
    <div class="stat-card"><div class="num" id="statStudents">-</div><div class="label" data-zh="学员" data-en="Students">学员</div></div>
    <div class="stat-card"><div class="num" id="statTotal">-</div><div class="label" data-zh="总数" data-en="Total">总数</div></div>
    <div class="stat-card"><div class="num" id="statHigh">-</div><div class="label" data-zh="高优" data-en="High">高优</div></div>
  </div>

  <div id="groupsContainer">
    <div class="empty"><p data-zh="加载中…" data-en="Loading…">加载中…</p></div>
  </div>
</div>

<!-- Create Modal -->
<div class="modal-overlay" id="createModal">
  <div class="modal-box">
    <button class="modal-close" id="createClose">&times;</button>
    <h2 data-zh="帮学员新建" data-en="Create for Student">帮学员新建</h2>
    <p data-zh="选择学员并填写信息" data-en="Select student and fill in details">选择学员并填写信息</p>
    <form class="modal-form" id="createForm">
      <label data-zh="学员 *" data-en="Student *">学员 *</label>
      <select id="createStudent" required>
        <option value="" data-zh="-- 选择学员 --" data-en="-- Select --">-- 选择学员 --</option>
      </select>
      <label data-zh="标题 *" data-en="Title *">标题 *</label>
      <input type="text" id="createTitle" required data-zh-ph="输入标题" data-en-ph="Enter title" placeholder="输入标题">
      <label data-zh="描述" data-en="Description">描述</label>
      <textarea id="createContent" data-zh-ph="具体描述" data-en-ph="Description"></textarea>
      <label data-zh="分类" data-en="Category">分类</label>
      <input type="text" id="createCategory" data-zh-ph="分类" data-en-ph="Category" placeholder="分类">
      <label data-zh="优先级" data-en="Priority">优先级</label>
      <select id="createPriority">
        <option value="高" data-zh="高" data-en="High">高</option>
        <option value="中" selected data-zh="中" data-en="Medium">中</option>
        <option value="低" data-zh="低" data-en="Low">低</option>
      </select>
      <label data-zh="标签" data-en="Tags">标签</label>
      <input type="text" id="createTags" data-zh-ph="逗号分隔" data-en-ph="Comma separated" placeholder="逗号分隔">
      <button type="submit" class="modal-submit" data-zh="提交" data-en="Submit">提交</button>
      <p class="modal-status" id="createStatus"></p>
    </form>
  </div>
</div>

<script>
const API = location.origin + '/api';
let allStudents = [];
let currentUser = null;

function getLang() { return localStorage.getItem('snailai-lang') || 'zh'; }
function setLang(l) { localStorage.setItem('snailai-lang', l); applyLang(l); }
function applyLang(lang) {
  document.querySelectorAll('[data-zh]').forEach(el => { el.textContent = el.getAttribute(lang==='zh'?'data-zh':'data-en'); });
  document.querySelectorAll('[data-zh-ph]').forEach(el => { el.placeholder = el.getAttribute(lang==='zh'?'data-zh-ph':'data-en-ph'); });
  document.getElementById('langBtn').textContent = lang==='zh'?'EN':'中文';
}
document.getElementById('langBtn').onclick = () => setLang(getLang()==='zh'?'en':'zh');

async function api(path, opts={}) {
  const token = sessionStorage.getItem('snailai_api_token');
  const headers = opts.headers || {};
  if (token) headers['Authorization'] = 'Bearer ' + token;
  if (opts.body && !headers['Content-Type']) headers['Content-Type'] = 'application/json';
  return fetch(API+path, { ...opts, headers }).then(r => r.json());
}

async function loadUser() {
  const d = await api('/me');
  if (!d.ok) { location.href = 'mobile.html'; return; }
  currentUser = d.user;
  if (!['ta','instructor','admin'].includes(currentUser.role)) location.href = 'mobile.html';
}

async function loadStudents() {
  const d = await api('/ai-needs?all=1');
  if (!d.ok) { document.getElementById('groupsContainer').innerHTML = '<div class="empty"><p>加载失败</p></div>'; return; }
  allStudents = d.students || [];
  let total=0, high=0;
  allStudents.forEach(s => { total+=s.needs.length; s.needs.forEach(n=>{ if(n.priority==='高') high++; }); });
  document.getElementById('statStudents').textContent = allStudents.length;
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statHigh').textContent = high;
  // 学员下拉
  const sel = document.getElementById('createStudent');
  while (sel.options.length > 1) sel.remove(1);
  allStudents.forEach(s => {
    const o = document.createElement('option'); o.value = s.username; o.textContent = (s.name||s.username); sel.appendChild(o);
  });
  renderGroups();
}

function renderGroups() {
  const search = (document.getElementById('searchInput').value||'').toLowerCase();
  const prio = document.getElementById('priorityFilter').value;
  const container = document.getElementById('groupsContainer');
  let filtered = allStudents;
  if (search) filtered = filtered.filter(s => (s.name||'').toLowerCase().includes(search) || s.username.toLowerCase().includes(search));
  filtered = filtered.map(s => {
    let needs = s.needs;
    if (prio) needs = needs.filter(n => n.priority===prio);
    return { ...s, needs };
  }).filter(s => s.needs.length > 0);
  if (filtered.length===0) {
    container.innerHTML = '<div class="empty"><div class="ico">🧠</div><p data-zh="没有符合条件的 AI 刚需" data-en="No matching AI needs">没有符合条件的 AI 刚需</p></div>';
    applyLang(getLang()); return;
  }
  container.innerHTML = filtered.map(s => `
    <div class="student-group open" data-username="${s.username}">
      <div class="student-header" onclick="toggleGroup(this)">
        <div class="student-avatar">${(s.name||s.username).charAt(0)}</div>
        <div class="student-info"><div class="name">${s.name||s.username}</div><div class="username">${s.username}</div></div>
        <div class="student-count">${s.needs.length}</div>
        <div class="student-arrow">▼</div>
      </div>
      <div class="student-needs">
        ${s.needs.map(n => `
          <div class="need-card" data-id="${n.id}">
            <div class="nc-head">
              <span class="nc-seq">#${n.seq}</span>
              <span class="nc-title">${escHtml(n.title)}</span>
              <span class="priority-tag ${n.priority==='高'?'high':n.priority==='低'?'low':'mid'}">${n.priority}</span>
            </div>
            ${n.category?'<div style="margin-bottom:6px"><span style="font-size:11px;color:var(--accent);background:var(--accent-light);padding:1px 8px;border-radius:100px;">'+escHtml(n.category)+'</span></div>':''}
            ${n.content?'<div class="nc-content">'+escHtml(n.content)+'</div>':''}
            <div class="nc-meta"><span>${fmtDate(n.updated_at)}</span></div>
            <div class="nc-actions">
              <button class="btn-sm" onclick="editNeed(${n.id})" data-zh="编辑" data-en="Edit">编辑</button>
              <button class="btn-sm danger" onclick="deleteNeed(${n.id})" data-zh="删除" data-en="Del">删除</button>
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
  applyLang(getLang());
}

function toggleGroup(h) { h.closest('.student-group').classList.toggle('open'); }
function escHtml(s) { if(!s) return ''; return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtDate(s) { if(!s) return ''; const d=new Date(s); return d.toLocaleDateString('zh-CN',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}); }

document.getElementById('searchInput').addEventListener('input', renderGroups);
document.getElementById('priorityFilter').addEventListener('change', renderGroups);

// Create Modal
document.getElementById('openCreateBtn').onclick = () => {
  document.getElementById('createForm').reset();
  document.getElementById('createStatus').textContent = '';
  document.getElementById('createModal').classList.add('open');
};
document.getElementById('createClose').onclick = () => document.getElementById('createModal').classList.remove('open');
document.getElementById('createModal').addEventListener('click', e => { if(e.target===e.currentTarget) document.getElementById('createModal').classList.remove('open'); });

document.getElementById('createForm').addEventListener('submit', async ev => {
  ev.preventDefault();
  const st = document.getElementById('createStatus');
  const username = document.getElementById('createStudent').value;
  if(!username) { st.textContent='请选择学员'; st.style.color='#dc2626'; return; }
  const body = {
    username,
    title: document.getElementById('createTitle').value.trim(),
    content: document.getElementById('createContent').value.trim(),
    category: document.getElementById('createCategory').value.trim(),
    priority: document.getElementById('createPriority').value,
    tags: document.getElementById('createTags').value.split(/[,，]/).map(x=>x.trim()).filter(Boolean)
  };
  if(!body.title) { st.textContent='标题不能为空'; st.style.color='#dc2626'; return; }
  st.textContent='提交中…'; st.style.color='';
  const d = await api('/ai-needs', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
  if(d.ok) { st.textContent='成功！'; st.style.color='#059669'; setTimeout(()=>{ document.getElementById('createModal').classList.remove('open'); loadStudents(); }, 800); }
  else { st.textContent=d.error||'失败'; st.style.color='#dc2626'; }
});

// Edit/Delete (simplified for mobile - reuse create modal with edit mode)
async function deleteNeed(id) {
  if(!confirm('确认删除？')) return;
  const d = await api('/ai-needs/'+id, { method:'DELETE' });
  if(d.ok) loadStudents(); else alert(d.error||'删除失败');
}

(async () => {
  await loadUser();
  await loadStudents();
  applyLang(getLang());
})();
</script>
</body>
</html>
