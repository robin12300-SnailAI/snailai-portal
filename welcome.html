<!DOCTYPE html>
<html lang="zh-CN" data-title-zh="我的学堂 · 蜗牛AI 学员学堂" data-title-en="My Portal · SnailAI Student Portal">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的学堂 · 蜗牛AI 学员学堂</title>
  <style>
    :root{--paper:#FCFCFA;--ink:#1A1A2E;--ink2:#4a4a5e;--ink3:#8a8a9a;
      --line:#e6e6ec;--accent:#FF5B1F;--accent-soft:#fff1ea;
      --green:#10b981;--green-bg:#e7f8f1;--green2:#059669;
      --blue:#3b82f6;--blue-bg:#eaf1ff;--blue2:#1d4ed8;
      --radius:14px;--shadow:0 2px 8px rgba(26,26,46,.06);--shadow-lg:0 8px 32px rgba(26,26,46,.10)}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",system-ui,sans-serif;
      background:var(--paper);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased}

    /* 语言切换器 */
    .lang-switch{position:fixed;top:16px;right:16px;z-index:500;display:flex;gap:4px;
      background:#fff;border:1px solid var(--line);border-radius:100px;padding:4px;box-shadow:var(--shadow)}
    .lang-switch .lang-btn{font-family:inherit;font-size:13px;font-weight:600;border:none;
      background:transparent;color:var(--ink3);padding:6px 14px;border-radius:100px;cursor:pointer;transition:.15s}
    .lang-switch .lang-btn.active{background:var(--accent);color:#fff}

    /* ---- 顶部栏 ---- */
    .topbar{max-width:960px;margin:0 auto;padding:20px 24px;display:flex;align-items:center;
      justify-content:space-between}
    .brand{font-weight:800;font-size:18px;color:var(--ink)}
    .brand span{color:var(--accent)}

    /* ---- 欢迎区 ---- */
    .hero{text-align:center;padding:40px 24px 20px;max-width:960px;margin:0 auto}
    .hero-avatar{font-size:56px;margin-bottom:12px;line-height:1}
    .hero h1{font-size:32px;font-weight:900;margin-bottom:4px}
    .hero h1 .name{color:var(--accent)}
    .hero-role{display:inline-block;background:var(--green-bg);color:var(--green2);
      font-size:14px;font-weight:700;padding:4px 14px;border-radius:20px;margin-top:8px}
    .hero-sub{color:var(--ink3);font-size:15px;margin-top:12px}

    /* ---- 区块 ---- */
    .section{max-width:960px;margin:0 auto;padding:0 24px}
    .section-title{font-size:20px;font-weight:900;margin:30px 0 2px;display:flex;align-items:center;gap:9px}
    .section-title::before{content:"";width:4px;height:20px;background:var(--accent);border-radius:2px;display:inline-block}
    .section-sub{color:var(--ink3);font-size:13px;margin-bottom:16px}

    /* ---- 卡片网格 ---- */
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
      gap:20px;margin-bottom:8px}
    .card{background:#fff;border:1px solid var(--line);border-radius:var(--radius);
      box-shadow:var(--shadow);padding:26px 22px;transition:.25s;cursor:pointer;text-decoration:none;
      display:block;position:relative;overflow:hidden}
    .card:hover{box-shadow:var(--shadow-lg);transform:translateY(-3px);border-color:var(--accent)}
    .card-icon{font-size:38px;margin-bottom:12px}
    .card h3{font-size:18px;font-weight:800;margin-bottom:6px}
    .card p{font-size:13.5px;color:var(--ink3);line-height:1.6}
    .card-go{display:inline-flex;align-items:center;gap:6px;margin-top:14px;
      font-size:14px;font-weight:700;color:var(--accent)}
    .card-go::after{content:"→";transition:transform .2s}
    .card:hover .card-go::after{transform:translateX(4px)}
    .card--accent{border-color:var(--accent);background:var(--accent-soft)}
    .card--accent .card-go{color:var(--accent)}

    /* ---- 特色标记 ---- */
    .badge{position:absolute;top:16px;right:16px;background:var(--accent);
      color:#fff;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px}
    .badge--blue{background:var(--blue)}

    /* ---- 底部 ---- */
    .foot{text-align:center;color:var(--ink3);font-size:13px;padding:32px 24px;
      border-top:1px solid var(--line);margin-top:32px}

    /* ---- 我的 AI 刚需 ---- */
    .needs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
      gap:16px;margin-bottom:8px}
    .need-card{background:#fff;border:1px solid var(--line);border-radius:var(--radius);
      box-shadow:var(--shadow);padding:18px 18px 16px;position:relative}
    .need-head{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
    .need-seq{font-weight:900;font-size:13px;color:var(--accent);background:var(--accent-soft);
      padding:2px 9px;border-radius:8px}
    .pri-badge{font-size:11px;font-weight:700;padding:2px 9px;border-radius:20px;color:#fff}
    .cat-badge{font-size:11px;font-weight:700;padding:2px 9px;border-radius:20px;
      background:var(--blue-bg);color:var(--blue2)}
    .need-title{font-size:16px;font-weight:800;margin:2px 0 6px}
    .need-content{font-size:13.5px;color:var(--ink2);line-height:1.6;white-space:pre-wrap;word-break:break-word}
    .need-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
    .tag-chip{font-size:11px;background:#f1f1f6;color:var(--ink2);padding:2px 9px;border-radius:20px}
    .need-actions{display:flex;gap:8px;margin-top:12px}
    .need-actions button{font-family:inherit;font-size:12.5px;font-weight:700;border:1px solid var(--line);
      background:#fff;color:var(--ink2);padding:5px 12px;border-radius:8px;cursor:pointer;transition:.15s}
    .need-actions button:hover{border-color:var(--accent);color:var(--accent)}
    .need-actions .del:hover{border-color:#ef4444;color:#ef4444}
    .needs-empty{color:var(--ink3);font-size:14px;padding:18px 4px}
    .btn-primary{font-family:inherit;font-size:13.5px;font-weight:700;border:none;background:var(--accent);
      color:#fff;padding:8px 16px;border-radius:9px;cursor:pointer}
    .btn-ghost{font-family:inherit;font-size:13.5px;font-weight:700;border:1px solid var(--line);
      background:#fff;color:var(--ink2);padding:8px 16px;border-radius:9px;cursor:pointer}
    .sel{font-family:inherit;font-size:13.5px;border:1px solid var(--line);border-radius:9px;
      padding:7px 11px;background:#fff;color:var(--ink);max-width:240px}
    /* 弹窗 */
    .mask{position:fixed;inset:0;background:rgba(26,26,46,.45);display:flex;align-items:center;
      justify-content:center;z-index:1000;padding:20px}
    .modal{background:#fff;border-radius:16px;width:100%;max-width:480px;padding:24px;box-shadow:var(--shadow-lg)}
    .modal h3{font-size:18px;font-weight:900;margin-bottom:16px}
    .field{margin-bottom:14px}
    .field label{display:block;font-size:13px;font-weight:700;color:var(--ink2);margin-bottom:6px}
    .field input,.field textarea,.field select{width:100%;font-family:inherit;font-size:14px;
      border:1px solid var(--line);border-radius:9px;padding:9px 11px;color:var(--ink);background:#fff;
      box-sizing:border-box}
    .field textarea{resize:vertical;min-height:84px}
    .modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:6px}
  </style>
</head>
<body>

  <div class="lang-switch">
    <button class="lang-btn active" data-lang="zh">中文</button>
    <button class="lang-btn" data-lang="en">EN</button>
  </div>

  <!-- 顶栏 -->
  <div class="topbar">
    <div class="brand" data-zh="🐌 蜗牛AI · 学员学堂" data-en="🐌 SnailAI · Student Portal">🐌 蜗牛AI · 学员学堂</div>
    <div id="userArea"></div>
  </div>

  <!-- 欢迎区 -->
  <div class="hero">
    <div class="hero-avatar">👋</div>
    <h1><span id="welcomePrefix" data-zh="欢迎回来，" data-en="Welcome back, ">欢迎回来，</span><span class="name" id="welcomeName">同学</span></h1>
    <div class="hero-role" id="roleBadge">学员</div>
    <p class="hero-sub" id="heroSub">以下是你的课程、资料与学习工具</p>
  </div>

  <!-- 动态内容 -->
  <div id="content"></div>

  <div class="foot" data-zh="蜗牛AI 学员学堂 · SnailAI Student Portal · © 2026 SnailAI · v1.0.1" data-en="SnailAI Student Portal · © 2026 SnailAI · v1.0.1">蜗牛AI 学员学堂 · SnailAI Student Portal · © 2026 SnailAI · v1.0.1</div>

  <script>
    const LANG_KEY = "snailai-lang";
    const S_KEY = "snailai_api_token";
    const U_KEY = "snailai_me";

    let curLang = localStorage.getItem(LANG_KEY) || 'zh';

    // 未登录 → 回登录页
    let token = sessionStorage.getItem(S_KEY);
    let me = null;
    try { me = JSON.parse(sessionStorage.getItem(U_KEY) || "null"); } catch(e){}
    if (!token || !me) { location.href = "login.html"; }

    const ROLE_NAME = {
      student:   {zh:"学员", en:"Student"},
      ta:        {zh:"助教", en:"Teaching Assistant"},
      instructor:{zh:"讲师", en:"Instructor"}
    };
    const ROLE_DESC = {
      student:   {zh:"查看你的课程回顾、课件与 AI 能力进度", en:"View your lesson recaps, courseware and AI capability progress"},
      ta:        {zh:"查看全部学员能力进度，进行助教审核", en:"Review all students' capability progress and conduct TA verification"},
      instructor:{zh:"查看全部学员能力进度，进行讲师终审", en:"Review all students' capability progress and conduct final instructor sign-off"}
    };

    // 各板块（href 为相对门户根目录的路径，带空格已编码）。文案双语。
    const SECTIONS = [
      {
        title: {zh:"我的课程", en:"My Courses"},
        sub:   {zh:"每节课的章节回顾与课件下载，随时回看", en:"Chapter recaps and downloadable materials for every lesson"},
        items: [
          { icon:"🟢", title:{zh:"AI 应用线上班", en:"AI Applications · Online"}, badge:null,
            desc:{zh:"零基础到能用的 AI 应用入门。12 节课程回顾、章节要点与课件下载。",
                  en:"From zero to useful AI. 12 lesson recaps, key points and downloadable courseware."},
            href:"AI%20应用线上班/", accent:true },
          { icon:"💰", title:{zh:"AI 财富线下班", en:"AI Wealth · Offline"}, badge:null,
            desc:{zh:"悉尼线下 · 用 AI 武装投资决策。课件、实战资料与案例。",
                  en:"Sydney on-site · arm your investment decisions with AI. Courseware, hands-on materials and cases."},
            href:"AI%20财富线下班/" }
        ]
      },
      {
        title: {zh:"能力 & 资料", en:"Capabilities & Resources"},
        sub:   {zh:"能力进度跟踪与历次分享回放", en:"Capability tracking and replays of past sessions"},
        items: [
          { icon:"✅", title:{zh:"AI 能力清单", en:"AI Capability Checklist"}, badge:null,
            desc:{zh:"9 项课前准备能力进度。三色标签：学员自查 🟢 / 助教审核 🔵 / 讲师审核 🟠。",
                  en:"Progress on 9 pre-class capabilities. Three-color tags: self-check 🟢 / TA review 🔵 / instructor review 🟠."},
            href:"AI%20能力清单/", accent:true },
          { icon:"🎤", title:{zh:"路演直播 PPT", en:"Pitch & Livestream PPT"}, badge:{zh:"回放",en:"Replay"},
            desc:{zh:"历次分享会与直播的 PPT 合集，随时回看。",
                  en:"A collection of PPTs from past sharing sessions and livestreams, available anytime."},
            href:"路演直播%20PPT/" }
        ]
      },
      {
        title: {zh:"课程大纲", en:"Course Outlines"},
        sub:   {zh:"完整课程地图与课前准备", en:"Full course map and pre-class preparation"},
        items: [
          { icon:"📘", title:{zh:"线上课大纲", en:"Online Course Outline"}, badge:null,
            desc:{zh:"AI 澳洲应用线上课 · 完整 24 课时大纲与课前准备清单。",
                  en:"AI Australia Applications · full 24-lesson outline and pre-class checklist."},
            href:"online-course/" },
          { icon:"📗", title:{zh:"线下课大纲", en:"Offline Course Outline"}, badge:null,
            desc:{zh:"AI 财富线下课 · 完整大纲、课前准备与报名信息。",
                  en:"AI Wealth offline class · full outline, pre-class prep and enrolment info."},
            href:"offline-course/" }
        ]
      }
    ];

    const LABEL = {
      open:   {zh:"打开", en:"Open"},
      logout: {zh:"退出", en:"Log out"}
    };

    function t(obj){ return (obj && obj[curLang]) || (obj && obj.zh) || ""; }

    // 渲染顶部用户信息
    function renderUserArea(){
      const btnLabel = t(LABEL.logout);
      document.getElementById("userArea").innerHTML =
        `<span style="font-size:14px;color:var(--ink3)">${me.name}</span>` +
        ` <button onclick="doLogout()" style="margin-left:10px;padding:5px 14px;border:1px solid var(--line);` +
        `border-radius:8px;background:#fff;cursor:pointer;font-size:13px;font-weight:600;color:var(--ink2)">${btnLabel}</button>`;
    }

    // 渲染欢迎区
    function renderHero(){
      document.getElementById("welcomeName").textContent = me.name.split(/\s/).pop() || me.name;
      document.getElementById("roleBadge").textContent = t(ROLE_NAME[me.role] || {zh:me.role, en:me.role});
      document.getElementById("heroSub").textContent = t(ROLE_DESC[me.role] || {zh:"欢迎来到蜗牛AI学员学堂", en:"Welcome to SnailAI Student Portal"});
    }

    // 渲染动态板块
    function renderContent(){
      const content = document.getElementById("content");
      content.innerHTML = "";
      SECTIONS.forEach(sec => {
        const wrap = document.createElement("div");
        wrap.className = "section";
        const cards = sec.items.map(c => `
          <a class="card ${c.accent ? "card--accent" : ""}" href="${c.href}">
            ${c.badge ? `<span class="badge ${c.badge.zh==="回放"?"badge--blue":""}">${t(c.badge)}</span>` : ""}
            <div class="card-icon">${c.icon}</div>
            <h3>${t(c.title)}</h3>
            <p>${t(c.desc)}</p>
            <div class="card-go">${t(LABEL.open)} →</div>
          </a>`).join("");
        wrap.innerHTML = `
          <h2 class="section-title">${t(sec.title)}</h2>
          <p class="section-sub">${t(sec.sub)}</p>
          <div class="grid">${cards}</div>`;
        content.appendChild(wrap);
      });
    }

    function applyLang(lang){
      curLang = lang;
      document.documentElement.setAttribute('lang', lang === 'en' ? 'en' : 'zh-CN');
      document.querySelectorAll('[data-zh]').forEach(el => {
        const tx = el.getAttribute('data-' + lang);
        if (tx !== null) el.textContent = tx;
      });
      const ti = document.querySelector('[data-title-zh]');
      if (ti) document.title = ti.getAttribute('data-title-' + lang);
      document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
      localStorage.setItem(LANG_KEY, lang);
      // 重新渲染 JS 动态内容
      renderUserArea();
      renderHero();
      renderContent();
      renderNeeds();
    }

    // 初始化调用已移到脚本末尾（避免 applyLang 中 renderNeeds 在常量声明前执行）

    // ===================== 我的 AI 刚需 =====================
    const NEEDS_TITLE = {zh:"我的 AI 刚需", en:"My AI Needs"};
    const NEEDS_SUB = {zh:"记录你想用 AI 解决的真问题。可新建多个，按编号排列，分类 / 优先级 / 标签自由组织。",
                       en:"Record the real problems you want AI to solve. Create as many as you like — numbered, with category / priority / tags."};
    const NL = {
      new:     {zh:"➕ 新建 AI 刚需", en:"➕ New AI Need"},
      edit:    {zh:"编辑 AI 刚需", en:"Edit AI Need"},
      save:    {zh:"保存", en:"Save"},
      cancel:  {zh:"取消", en:"Cancel"},
      del:     {zh:"删除", en:"Delete"},
      title:   {zh:"标题", en:"Title"},
      content: {zh:"内容（想让 AI 帮你做什么）", en:"Content (what you want AI to do for you)"},
      category:{zh:"分类", en:"Category"},
      priority:{zh:"优先级", en:"Priority"},
      tags:    {zh:"标签（逗号分隔，数量不限）", en:"Tags (comma-separated, unlimited)"},
      high:    {zh:"高", en:"High"},
      mid:     {zh:"中", en:"Medium"},
      low:     {zh:"低", en:"Low"},
      empty:   {zh:"还没有记录，点「新建 AI 刚需」写下第一个吧。", en:"No entries yet. Click “New AI Need” to write your first one."},
      delConfirm:{zh:"确定删除这条「我的 AI 刚需」吗？", en:"Delete this AI Need?"},
      reqTitle:{zh:"标题不能为空", en:"Title is required"},
      saveFail:{zh:"保存失败：", en:"Save failed: "},
      delFail: {zh:"删除失败：", en:"Delete failed: "}
    };
    const PRI_COLOR = {高:"#ef4444", 中:"#f59e0b", 低:"#9ca3af"};
    const PRI_LABEL = {高:NL.high, 中:NL.mid, 低:NL.low};

    let needTarget = me.username;     // 学员=自己；助教/讲师=选中的学员
    let needsCache = [];              // 当前列表缓存，供编辑时读取

    async function api(path, method, body){
      const opt = {method, headers:{"Authorization":"Bearer "+token, "Content-Type":"application/json"}};
      if (body !== undefined) opt.body = JSON.stringify(body);
      const r = await fetch(path, opt);
      return r.json();
    }
    function escapeHtml(s){
      return String(s==null?"":s).replace(/[&<>"']/g,
        c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
    }

    async function renderNeeds(){
      const content = document.getElementById("content");
      if (!content) return;
      const sec = document.createElement("div");
      sec.className = "section";
      sec.innerHTML = `
        <h2 class="section-title">🧠 ${t(NEEDS_TITLE)}</h2>
        <p class="section-sub">${t(NEEDS_SUB)}</p>
        <div id="needsToolbar" style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:14px;"></div>
        <div id="needsList" class="needs-grid"></div>`;
      content.appendChild(sec);
      const tb = sec.querySelector("#needsToolbar");
      if (me.role !== "student"){
        const sel = document.createElement("select");
        sel.id = "needStudentSel"; sel.className = "sel";
        tb.appendChild(sel);
        sel.addEventListener("change", async () => { needTarget = sel.value; await loadNeeds(); });
        await loadStudentPicker(sel);
      }
      const btn = document.createElement("button");
      btn.className = "btn-primary"; btn.textContent = t(NL.new);
      btn.onclick = () => openNeedForm(null);
      tb.appendChild(btn);
      await loadNeeds();
    }

    async function loadStudentPicker(sel){
      try{
        const d = await api("/api/students","GET");
        if (d.ok && d.students.length){
          sel.innerHTML = d.students.map(s=>`<option value="${s.username}">${escapeHtml(s.name)}</option>`).join("");
          if (!needTarget || needTarget === me.username) needTarget = d.students[0].username;
          sel.value = needTarget;
        }
      }catch(e){}
    }

    async function loadNeeds(){
      const list = document.getElementById("needsList");
      if (!list) return;
      list.innerHTML = `<div class="needs-empty">…</div>`;
      const d = await api("/api/ai-needs?username="+encodeURIComponent(needTarget),"GET");
      if (!d.ok){ list.innerHTML = `<div class="needs-empty">${escapeHtml(d.error||"")}</div>`; return; }
      needsCache = d.needs || [];
      if (!needsCache.length){ list.innerHTML = `<div class="needs-empty">${t(NL.empty)}</div>`; return; }
      list.innerHTML = needsCache.map(n => {
        const tags = (n.tags||[]).map(x=>`<span class="tag-chip">${escapeHtml(x)}</span>`).join("");
        const pri = n.priority || "中";
        const color = PRI_COLOR[pri] || "#9ca3af";
        const priLbl = (PRI_LABEL[pri] && PRI_LABEL[pri][curLang]) || pri;
        return `
        <div class="need-card">
          <div class="need-head">
            <span class="need-seq">#${n.seq}</span>
            <span class="pri-badge" style="background:${color}">${priLbl}</span>
            ${n.category ? `<span class="cat-badge">${escapeHtml(n.category)}</span>` : ""}
          </div>
          <div class="need-title">${escapeHtml(n.title)}</div>
          ${n.content ? `<div class="need-content">${escapeHtml(n.content)}</div>` : ""}
          ${tags ? `<div class="need-tags">${tags}</div>` : ""}
          <div class="need-actions">
            <button onclick="openNeedForm(${n.id})">${t(NL.edit)}</button>
            <button class="del" onclick="deleteNeed(${n.id})">${t(NL.del)}</button>
          </div>
        </div>`;
      }).join("");
    }

    function openNeedForm(id){
      const isEdit = !!id;
      const cur = isEdit ? (needsCache.find(x=>x.id===id) || null) : null;
      const pri = cur ? (cur.priority || "中") : "中";
      const tagsVal = cur ? (cur.tags||[]).join(", ") : "";
      const mask = document.createElement("div");
      mask.className = "mask";
      mask.innerHTML = `
        <div class="modal">
          <h3>${isEdit ? t(NL.edit) : t(NL.new)}</h3>
          <div class="field"><label>${t(NL.title)}</label><input id="nfTitle" value="${cur?escapeHtml(cur.title):""}"></div>
          <div class="field"><label>${t(NL.content)}</label><textarea id="nfContent">${cur?escapeHtml(cur.content||""):""}</textarea></div>
          <div class="field"><label>${t(NL.category)}</label><input id="nfCat" value="${cur?escapeHtml(cur.category||""):""}"></div>
          <div class="field"><label>${t(NL.priority)}</label>
            <select id="nfPri">
              <option value="高" ${pri==="高"?"selected":""}>${t(NL.high)}</option>
              <option value="中" ${pri==="中"?"selected":""}>${t(NL.mid)}</option>
              <option value="低" ${pri==="低"?"selected":""}>${t(NL.low)}</option>
            </select></div>
          <div class="field"><label>${t(NL.tags)}</label><input id="nfTags" value="${escapeHtml(tagsVal)}"></div>
          <div class="modal-actions">
            <button class="btn-ghost" onclick="closeNeedForm()">${t(NL.cancel)}</button>
            <button class="btn-primary" id="nfSave">${t(NL.save)}</button>
          </div>
        </div>`;
      document.body.appendChild(mask);
      mask.addEventListener("click", e => { if (e.target === mask) closeNeedForm(); });
      document.getElementById("nfSave").onclick = () => saveNeed(id);
    }
    function closeNeedForm(){ const m = document.querySelector(".mask"); if (m) m.remove(); }

    async function saveNeed(id){
      const payload = {
        title: document.getElementById("nfTitle").value.trim(),
        content: document.getElementById("nfContent").value,
        category: document.getElementById("nfCat").value.trim(),
        priority: document.getElementById("nfPri").value,
        tags: document.getElementById("nfTags").value
      };
      if (!payload.title){ alert(t(NL.reqTitle)); return; }
      let d;
      if (id){
        d = await api("/api/ai-needs/"+id, "PUT", payload);
      } else {
        if (me.role !== "student") payload.username = needTarget;
        d = await api("/api/ai-needs", "POST", payload);
      }
      if (!d.ok){ alert(t(NL.saveFail) + (d.error||"")); return; }
      closeNeedForm();
      await loadNeeds();
    }

    async function deleteNeed(id){
      if (!confirm(t(NL.delConfirm))) return;
      const d = await api("/api/ai-needs/"+id, "DELETE");
      if (!d.ok){ alert(t(NL.delFail) + (d.error||"")); return; }
      await loadNeeds();
    }

    document.querySelectorAll('.lang-btn').forEach(b => b.addEventListener('click', () => applyLang(b.dataset.lang)));

    // 初始渲染
    renderUserArea();
    renderHero();
    renderContent();
    applyLang(curLang);

    function doLogout() {
      sessionStorage.removeItem(S_KEY);
      sessionStorage.removeItem(U_KEY);
      location.href = "login.html";
    }
  </script>
</body>
</html>
